name: Deploy to GitHub Pages

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Publish Blazor WASM
      run: dotnet publish SearchModule.Demo/SearchModule.Demo.csproj -c Release -o release

    - name: Rewrite base href for GitHub Pages
      run: sed -i 's|<base href="/" />|<base href="/french-search-engine/" />|g' release/wwwroot/index.html

    - name: Add .nojekyll
      run: touch release/wwwroot/.nojekyll

    - name: Copy index.html to 404.html (SPA fallback)
      run: cp release/wwwroot/index.html release/wwwroot/404.html

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: release/wwwroot

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
