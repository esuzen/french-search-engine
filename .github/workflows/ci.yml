name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore SearchModule/SearchModule.csproj

    - name: Build
      run: dotnet build SearchModule/SearchModule.csproj --configuration Release --no-restore

    - name: Restore test dependencies
      run: dotnet restore SearchModule.Tests/SearchModule.Tests.csproj

    - name: Test
      run: dotnet test SearchModule.Tests/SearchModule.Tests.csproj --configuration Release --verbosity normal
